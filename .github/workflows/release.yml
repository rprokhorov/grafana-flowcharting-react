name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package plugin
        run: |
          mkdir -p out
          cp -r dist flowcharting-react-panel
          zip -r "out/flowcharting-react-panel-${GITHUB_REF_NAME}.zip" flowcharting-react-panel

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.zip
          generate_release_notes: true
